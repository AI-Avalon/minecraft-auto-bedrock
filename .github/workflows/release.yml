name: リリース作成 / Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: パッケージ作成 & GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存関係インストール
        run: npm ci --ignore-scripts

      - name: バージョン取得
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "タグ=$TAG  バージョン=$VER"

      - name: package.json バージョン照合
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER="${{ steps.ver.outputs.version }}"
          echo "package.json=$PKG_VER  タグ=$TAG_VER"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::package.json ($PKG_VER) とタグ ($TAG_VER) が不一致"
            exit 1
          fi

      - name: テスト実行
        run: npm test
        continue-on-error: true

      - name: dos2unix インストール
        run: sudo apt-get install -y dos2unix

      - name: Windows パッケージ作成 (ZIP)
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PKG="minecraft-auto-bedrock-windows-${TAG}"

          rsync -a \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='logs' \
            --exclude='local-server' \
            --exclude='data/bedrock-samples' \
            --exclude='.env' \
            --exclude='*.log' \
            --exclude='config.json' \
            --exclude='memory.json' \
            --exclude='.selfhost.pid' \
            ./ "dist/${PKG}/"

          for bat_file in \
            "dist/${PKG}/scripts/install-prereqs.bat" \
            "dist/${PKG}/run.bat"; do
            [ -f "$bat_file" ] && unix2dos "$bat_file"
          done

          cd dist
          zip -r "../${PKG}.zip" "${PKG}"
          echo "Windows ZIP 完了: ${PKG}.zip"

      - name: macOS/Linux パッケージ作成 (tar.gz)
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PKG="minecraft-auto-bedrock-macos-linux-${TAG}"

          rsync -a \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='logs' \
            --exclude='local-server' \
            --exclude='data/bedrock-samples' \
            --exclude='.env' \
            --exclude='*.log' \
            --exclude='config.json' \
            --exclude='memory.json' \
            --exclude='.selfhost.pid' \
            ./ "dist/${PKG}/"

          chmod +x \
            "dist/${PKG}/scripts/install-prereqs.sh" \
            "dist/${PKG}/run.sh"

          cd dist
          tar -czf "../${PKG}.tar.gz" "${PKG}"
          echo "macOS/Linux tar.gz 完了: ${PKG}.tar.gz"

      - name: リリースノート生成
        run: |
          python3 scripts/make-release-notes.py "${{ steps.ver.outputs.tag }}" > release-notes.md
          echo "リリースノート生成完了"

      - name: GitHub リリース作成
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          gh release create "$TAG" \
            --title "minecraft-auto-bedrock ${TAG}" \
            --notes-file release-notes.md \
            "minecraft-auto-bedrock-windows-${TAG}.zip" \
            "minecraft-auto-bedrock-macos-linux-${TAG}.tar.gz"
          echo "リリース作成完了: $TAG"
